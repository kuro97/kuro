; KuroTrack — кастомный dialplan для колтрекинга
; Установка в FreePBX:
;   1. Скопировать в /etc/asterisk/extensions_custom.conf
;   2. Скопировать call_tracking.py в /var/lib/asterisk/agi-bin/call_tracking.py (chmod +x)
;   3. asterisk -rx "dialplan reload"
;
; Входящий звонок на подменный DID обрабатывается AGI-скриптом,
; который определяет маршрут, запускает запись и передаёт на менеджера.

[kurotrack-inbound]
exten => _X.,1,NoOp(=== KuroTrack: DID=${EXTEN} CallerID=${CALLERID(num)} ===)
 same => n,Set(__TRACKING_DID=${EXTEN})
 ; DID в CDR(userfield) — нужно для матча в backend (AMI Event: Cdr -> UserField)
 same => n,Set(CDR(userfield)=${EXTEN})
 same => n,Answer()
 same => n,AGI(call_tracking.py,${EXTEN},${CALLERID(num)})
 same => n,Set(CDR(tracking_did)=${TRACKING_DID})
 same => n,Set(CDR(campaign_id)=${CAMPAIGN_ID})
 same => n,Set(CDR(session_id)=${SESSION_ID})
 same => n,MixMonitor(${RECORD_PATH}/${UNIQUEID}_${TRACKING_DID}.wav,b)
 ; Целевой номер возвращается из AGI (TARGET_NUMBER).
 ; Если его нет, маршрутизируем в очередь FreePBX по умолчанию (например, 'from-internal' -> 7000).
 same => n,GotoIf($["${TARGET_NUMBER}" = ""]?default_target:route_target)
 same => n(route_target),Dial(Local/${TARGET_NUMBER}@from-internal,60,tTg)
 same => n,Hangup()
 same => n(default_target),Goto(from-internal,7000,1)  ; поменять 7000 на вашу очередь/экстеншен
 same => n,Hangup()

; Callback — обратный звонок
; Сначала звоним менеджеру, потом клиенту
[kurotrack-callback]
exten => _X.,1,NoOp(=== KuroTrack Callback to ${EXTEN} ===)
 same => n,Set(CALLERID(name)=Callback)
 same => n,MixMonitor(${RECORD_PATH}/${UNIQUEID}_callback.wav,b)
 same => n,Dial(Local/${EXTEN}@from-internal,30,tTg)
 same => n,Hangup()
