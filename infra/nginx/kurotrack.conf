# ============================================================================
# KuroTrack — kt.aiplus.kz
# Symlinked from /etc/nginx/conf.d/kurotrack.conf
# ----------------------------------------------------------------------------
# Чтобы применить изменения:  sudo nginx -t && sudo systemctl reload nginx
# ============================================================================

# HTTPS — основной server-блок
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name kt.aiplus.kz;

    ssl_certificate     /etc/letsencrypt/live/kt.aiplus.kz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kt.aiplus.kz/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Статичный JS-файл DNI-snippet.
    location = /kurotrack.js {
        alias /home/alisher/kurotrack/frontend/snippet/kurotrack.js;
        add_header Cache-Control "public, max-age=3600";
        add_header Access-Control-Allow-Origin "*";
        default_type application/javascript;
    }

    # API kurotrack — проксирование на локальный uvicorn (alisher).
    location /api/ {
        proxy_pass http://127.0.0.1:8102;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, X-Api-Key" always;
        add_header Access-Control-Max-Age "3600" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # Health-check.
    location = /healthz {
        proxy_pass http://127.0.0.1:8102/api/v1/health;
        proxy_set_header Host $host;
        access_log off;
    }

    # Дашборд KuroTrack (React SPA).
    location /dashboard/ {
        alias /home/alisher/dashboard-build/dist/;
        try_files $uri $uri/ /dashboard/index.html;
        add_header Cache-Control "no-cache" always;
    }

    location = /dashboard {
        return 301 /dashboard/;
    }

    # Всё остальное — 404.
    location / {
        return 404;
    }
}

# HTTP → HTTPS редирект.
server {
    listen 80;
    listen [::]:80;
    server_name kt.aiplus.kz;
    return 301 https://$host$request_uri;
}
