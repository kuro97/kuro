# ============================================================================
# KuroTrack API + static JS for DNI snippet
# Подготовил: alisher @ 195.49.215.96 (пользователь kurotrack-проекта)
# ----------------------------------------------------------------------------
# Куда положить: /etc/nginx/conf.d/kurotrack.conf
# После копирования:
#   sudo certbot --nginx -d kt.aiplus.kz --non-interactive --agree-tos -m alisher.oktl777@gmail.com
#   sudo nginx -t && sudo systemctl reload nginx
# ----------------------------------------------------------------------------
# ЗАМЕНИТЬ ПЕРЕД УСТАНОВКОЙ: kt.aiplus.kz → на фактический поддомен.
# Больше ничего менять не нужно. certbot сам добавит SSL-секцию и 80→443 redirect.
# ============================================================================

server {
    listen 80;
    server_name kt.aiplus.kz;

    # Пока нет сертификата — на 80 порту отвечает certbot webroot challenge.
    # После `certbot --nginx` эта секция будет автоматически перезаписана
    # самим certbot'ом для редиректа на HTTPS.

    # Статичный JS-файл DNI-snippet (vanilla JS 157 строк, нет PHP, нет exec).
    location = /kurotrack.js {
        alias /home/alisher/kurotrack/frontend/snippet/kurotrack.js;
        add_header Cache-Control "public, max-age=3600";
        add_header Access-Control-Allow-Origin "*";
        default_type application/javascript;
    }

    # API kurotrack — проксирование на локальный uvicorn пользователя alisher.
    # Uvicorn слушает ТОЛЬКО 127.0.0.1:8102, снаружи напрямую не доступен.
    location /api/ {
        proxy_pass http://127.0.0.1:8102;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # CORS: страницы на Tilda делают fetch из HTTPS-origin.
        # Ограничено GET/POST/OPTIONS — никаких DELETE/PATCH снаружи.
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, X-Api-Key" always;
        add_header Access-Control-Max-Age "3600" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # Health-check (можно мониторить снаружи).
    location = /healthz {
        proxy_pass http://127.0.0.1:8102/api/v1/health;
        proxy_set_header Host $host;
        access_log off;
    }

    # Отказ по умолчанию — никаких других путей не обслуживаем.
    location / {
        return 404;
    }
}
