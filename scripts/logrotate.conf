# Ротация логов KuroTrack (worker/monitor/hourly/backup) без root.
# copytruncate обязателен: systemd (append:) и cron держат файлы открытыми,
# без copytruncate logrotate не сможет переоткрыть файл (нет сигнала сервису без root).
/home/alisher/kurotrack/logs/*.log
{
    daily
    rotate 14
    compress
    copytruncate
    missingok
    notifempty
    size 50M
}
